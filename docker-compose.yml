services:
  Nodo-principal:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: Nodo-principal
    hostname: Nodo-principal
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://Nodo-principal:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - namenode:/hadoop/dfs/name
    networks:
      - red-docker

  mysql-practica:
    image: mysql:8.0
    container_name: mysql-practica
    hostname: mysql-practica
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root1234
      - MYSQL_DATABASE=example
      - MYSQL_USER=alumne
      - MYSQL_PASSWORD=alumne1234
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - red-docker

  hive:
    image: apache/hive:4.0.0
    container_name: hive
    hostname: hive
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
    networks:
      - red-docker
networks:
  red-docker:
    name: red-docker
    driver: bridge

volumes:
  namenode:
  mysql_data:
